apiVersion: hub.mydecisive.ai/v1
kind: MdaiHub
metadata:
  labels:
    app.kubernetes.io/name: mdai-operator
    app.kubernetes.io/managed-by: kustomize
  name: mdaihub-sample
  namespace: mdai
spec:
  variables:
    - key: manual_filter
      type: manual
      dataType: string
      serializeAs:
        - name: "MANUAL_FILTER"
    - key: service_list
      serializeAs:
        - name: "SERVICE_LIST_REGEX"
          transformers:
            - type: join
              join:
                delimiter: "|"
        - name: "SERVICE_LIST_CSV"
          transformers:
            - type: join
              join:
                delimiter: ","
      # below properties are optional
      dataType: set
      storageType: "mdai-valkey"
    - key: team_list
      serializeAs:
        - name: "TEAM_LIST_REGEX"
          transformers:
            - type: join
              join:
                delimiter: "|"
        - name: "TEAM_LIST_CSV"
          transformers:
            - type: join
              join:
                delimiter: ","
      # below properties are optional
      dataType: set
      storageType: "mdai-valkey"

  prometheusAlert:
    - name: top_talkers
      expr: 'sum(increase(bytes_received_by_service_total{mdai_service!=""}[1m])) by (mdai_service, data_type) > 800*1024'
      severity: warning
      for: 1m
      keep_firing_for: 1m
    - name: top_listeners
      expr: 'sum(increase(bytes_sent_by_service_total{mdai_service!=""}[1h])) by (mdai_service, data_type) > 10*1024*1024'
      severity: warning
      for: 15m
      keep_firing_for: 10m
    - name: top_team_talkers
      expr: 'sum(increase(bytes_received_by_team_region_total{team!=""}[1h])) by (team, data_type) > 10*1024*1024'
      severity: warning
      for: 3m
      keep_firing_for: 10m

  automations:
    - name: top_talkers
      when:
        alertName: top_talkers
        status: firing
      then:
        - addToSet:
            set: service_list
            value: "{{ service_name }}"
        - callWebhook:
            url: "https://alerts.company.com/webhook"
            method: POST
            body:
              service: "{{ service_name }}"
              error_rate: "{{ error_rate }}"
    - name: top_team_talkers
      when:
        alertName: top_team_talkers
        status: resolved
      then:
        - removeFromSet:
            set: service_list
            value: "{{ service_name }}"